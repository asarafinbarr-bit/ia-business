<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>IA TrainLog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #12111A; --ink2: #3D3A52; --ink3: #8B87A0;
  --bg: #F4F2FA; --surface: #FFFFFF;
  --purple: #7B5EA7; --purple-d: #4E3880; --purple-l: #EDE7F6; --purple-ll: #F7F4FD;
  --green: #2ECC8F; --green-l: #E6FAF3;
  --amber: #F5A623; --amber-l: #FEF6E6;
  --red: #E8445A; --red-l: #FDEDF0;
  --radius-lg: 20px; --radius-md: 14px; --radius-sm: 10px;
  --shadow: 0 8px 32px rgba(78,56,128,0.10); --shadow-sm: 0 2px 10px rgba(78,56,128,0.08);
}
html,body { height:100%; font-family:'Heebo',sans-serif; background:var(--bg); color:var(--ink); direction:rtl; -webkit-font-smoothing:antialiased; }
.header { background:var(--ink); padding:20px 20px 18px; position:sticky; top:0; z-index:100; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid rgba(255,255,255,0.07); }
.header-brand { display:flex; align-items:center; gap:10px; }
.header-logo { width:38px; height:38px; background:var(--purple); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; }
.header-brand h1 { color:#fff; font-size:17px; font-weight:800; }
.header-brand p { color:rgba(255,255,255,0.45); font-size:11px; margin-top:1px; }
.header-actions { display:flex; gap:8px; align-items:center; }
.header-date { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.12); border-radius:22px; padding:6px 14px; color:rgba(255,255,255,0.85); font-size:12px; font-weight:500; cursor:pointer; }
.header-sync { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.12); border-radius:22px; padding:6px 10px; color:rgba(255,255,255,0.85); font-size:14px; cursor:pointer; }
.tabs-bar { background:var(--ink); display:flex; padding:0 16px 16px; gap:4px; overflow-x:auto; }
.tab-btn { padding:7px 13px; border-radius:22px; border:none; font-family:'Heebo',sans-serif; font-size:11px; font-weight:600; cursor:pointer; color:rgba(255,255,255,0.5); background:transparent; white-space:nowrap; }
.tab-btn.active { background:var(--purple); color:#fff; }
.main { padding:18px 16px 100px; max-width:520px; margin:0 auto; }
.today-banner { background:linear-gradient(135deg,var(--purple-d) 0%,var(--purple) 100%); border-radius:var(--radius-lg); padding:18px 20px; margin-bottom:18px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 6px 24px rgba(78,56,128,0.28); }
.today-banner .left h2 { color:#fff; font-size:14px; font-weight:500; opacity:0.8; }
.today-banner .left .date-big { color:#fff; font-size:24px; font-weight:900; letter-spacing:-1px; margin-top:2px; }
.today-banner .right { text-align:center; }
.today-banner .right .count-big { color:#fff; font-size:40px; font-weight:900; line-height:1; }
.today-banner .right .count-lbl { color:rgba(255,255,255,0.65); font-size:11px; font-weight:500; margin-top:2px; }
.section-title { font-size:11px; font-weight:700; color:var(--ink3); letter-spacing:0.8px; text-transform:uppercase; margin:20px 0 10px; display:flex; align-items:center; justify-content:space-between; }
.btn-add-client { background:var(--purple); color:#fff; border:none; border-radius:22px; padding:6px 14px; font-family:'Heebo',sans-serif; font-size:11px; font-weight:700; cursor:pointer; }
.client-card { background:var(--surface); border-radius:var(--radius-lg); margin-bottom:10px; box-shadow:var(--shadow-sm); overflow:hidden; border:1px solid rgba(123,94,167,0.06); }
.client-card-inner { display:flex; align-items:center; padding:14px 16px; gap:14px; }
.client-avatar { width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:800; flex-shrink:0; color:#fff; }
.client-info { flex:1; min-width:0; }
.client-name { font-size:15px; font-weight:700; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.client-meta { font-size:11px; color:var(--ink3); margin-top:2px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.client-meta .sep { width:3px; height:3px; border-radius:50%; background:var(--ink3); opacity:0.4; }
.progress-wrap { padding:0 16px 12px; }
.progress-track { height:5px; background:var(--bg); border-radius:3px; overflow:hidden; }
.progress-fill { height:100%; border-radius:3px; transition:width 0.6s; }
.btn-log { width:44px; height:44px; border-radius:50%; border:none; background:var(--purple); color:#fff; font-size:22px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.18s; flex-shrink:0; box-shadow:0 4px 14px rgba(123,94,167,0.4); }
.btn-log:hover { transform:scale(1.1); }
.btn-log:active { transform:scale(0.94); }
.btn-log.logging { animation:pulse-btn 0.4s ease; }
@keyframes pulse-btn { 0%{transform:scale(1)} 40%{transform:scale(1.25)} 100%{transform:scale(1)} }
.btn-log.warn-state { background:var(--amber); box-shadow:0 4px 14px rgba(245,166,35,0.4); }
.btn-log.danger-state { background:var(--red); box-shadow:0 4px 14px rgba(232,68,90,0.4); }
.badge { display:inline-flex; align-items:center; padding:3px 9px; border-radius:20px; font-size:10px; font-weight:700; }
.badge-ok { background:var(--green-l); color:#1A9B6C; }
.badge-warn { background:var(--amber-l); color:#C07D00; }
.badge-danger { background:var(--red-l); color:#C0213A; }
.badge-online { background:var(--purple-ll); color:var(--purple-d); }
.toast-container { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); z-index:999; display:flex; flex-direction:column; align-items:center; gap:8px; pointer-events:none; }
.toast { background:var(--ink); color:#fff; padding:12px 22px; border-radius:40px; font-size:13px; font-weight:500; box-shadow:0 8px 30px rgba(0,0,0,0.25); animation:toast-in 0.3s cubic-bezier(0.34,1.56,0.64,1); white-space:nowrap; }
.toast.removing { animation:toast-out 0.25s ease forwards; }
@keyframes toast-in { from{opacity:0;transform:translateY(12px) scale(0.92)} to{opacity:1;transform:translateY(0) scale(1)} }
@keyframes toast-out { from{opacity:1} to{opacity:0;transform:translateY(8px)} }
.modal-overlay { position:fixed; inset:0; background:rgba(18,17,26,0.6); z-index:200; display:flex; align-items:flex-end; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.25s; backdrop-filter:blur(3px); }
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal { background:var(--surface); border-radius:var(--radius-lg) var(--radius-lg) 0 0; padding:24px 20px 36px; width:100%; max-width:520px; transform:translateY(40px); transition:transform 0.28s cubic-bezier(0.34,1.2,0.64,1); max-height:90vh; overflow-y:auto; }
.modal-overlay.open .modal { transform:translateY(0); }
.modal-handle { width:40px; height:4px; background:#E0DDF0; border-radius:2px; margin:0 auto 20px; }
.modal h2 { font-size:18px; font-weight:800; color:var(--ink); margin-bottom:4px; }
.modal .modal-subtitle { font-size:13px; color:var(--ink3); margin-bottom:12px; }
.modal-sessions { max-height:220px; overflow-y:auto; display:flex; flex-direction:column; gap:6px; margin-bottom:16px; }
.session-row { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; background:var(--bg); border-radius:var(--radius-sm); font-size:13px; }
.session-row .snum { font-weight:700; color:var(--purple); min-width:28px; }
.session-row .sdel { width:26px; height:26px; border-radius:50%; border:none; background:var(--red-l); color:var(--red); cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; }
.modal-empty { text-align:center; padding:30px; color:var(--ink3); font-size:13px; }
.btn-modal-close { width:100%; padding:14px; background:var(--bg); border:none; border-radius:var(--radius-md); font-family:'Heebo',sans-serif; font-size:14px; font-weight:600; color:var(--ink2); cursor:pointer; margin-top:8px; }
.history-day { margin-bottom:16px; }
.history-day-header { font-size:11px; font-weight:700; color:var(--ink3); letter-spacing:0.5px; margin-bottom:8px; display:flex; align-items:center; gap:8px; }
.history-day-header::after { content:''; flex:1; height:1px; background:var(--bg); }
.history-entry { display:flex; align-items:center; gap:12px; padding:10px 14px; background:var(--surface); border-radius:var(--radius-sm); margin-bottom:6px; box-shadow:var(--shadow-sm); font-size:13px; }
.history-entry .h-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.history-entry .h-name { font-weight:600; flex:1; }
.history-entry .h-num { font-size:11px; color:var(--ink3); }
.alert-card { background:var(--surface); border-radius:var(--radius-md); padding:16px; margin-bottom:10px; border-right:4px solid; box-shadow:var(--shadow-sm); display:flex; align-items:center; gap:14px; }
.alert-card.warn { border-color:var(--amber); }
.alert-card.danger { border-color:var(--red); }
.alert-card .a-icon { font-size:24px; }
.alert-card .a-name { font-size:14px; font-weight:700; }
.alert-card .a-text { font-size:12px; color:var(--ink3); margin-top:2px; }
.alert-card .a-right { margin-right:auto; text-align:center; }
.alert-card .a-num { font-size:28px; font-weight:900; line-height:1; }
.alert-card.warn .a-num { color:var(--amber); }
.alert-card.danger .a-num { color:var(--red); }
.alert-card .a-sub { font-size:10px; color:var(--ink3); }
.empty-state { text-align:center; padding:50px 20px; color:var(--ink3); }
.empty-state .e-icon { font-size:52px; margin-bottom:12px; opacity:0.5; }
.empty-state p { font-size:14px; }
.date-picker-modal { display:none; position:fixed; inset:0; background:rgba(18,17,26,0.5); z-index:300; align-items:center; justify-content:center; backdrop-filter:blur(4px); }
.date-picker-modal.open { display:flex; }
.date-picker-inner { background:var(--surface); border-radius:var(--radius-lg); padding:24px; width:300px; box-shadow:var(--shadow); }
.date-picker-inner h3 { font-size:16px; font-weight:700; margin-bottom:16px; }
.date-picker-inner input[type=date] { width:100%; padding:12px 14px; border:2px solid var(--purple-l); border-radius:var(--radius-sm); font-family:'Heebo',sans-serif; font-size:14px; outline:none; margin-bottom:14px; }
.dp-btns { display:flex; gap:8px; }
.dp-btns button { flex:1; padding:12px; border-radius:var(--radius-sm); border:none; font-family:'Heebo',sans-serif; font-size:13px; font-weight:600; cursor:pointer; }
.dp-cancel { background:var(--bg); color:var(--ink2); }
.dp-confirm { background:var(--purple); color:#fff; }
.field-group { display:flex; flex-direction:column; gap:10px; margin-top:14px; }
.field-group input, .field-group select, .field-group textarea {
  padding:12px 14px; border-radius:var(--radius-sm); border:1.5px solid #e0daea;
  font-family:'Heebo',sans-serif; font-size:14px; direction:rtl; background:#fff; outline:none;
  transition:border 0.2s;
}
.field-group input:focus, .field-group select:focus { border-color:var(--purple); }
.field-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.btn-primary { width:100%; padding:14px; background:var(--purple); color:#fff; border:none; border-radius:var(--radius-md); font-family:'Heebo',sans-serif; font-size:15px; font-weight:700; cursor:pointer; margin-top:14px; }
.btn-danger { width:100%; padding:12px; background:var(--red-l); color:var(--red); border:none; border-radius:var(--radius-md); font-family:'Heebo',sans-serif; font-size:13px; font-weight:600; cursor:pointer; margin-top:8px; }
.sync-indicator { font-size:10px; color:rgba(255,255,255,0.4); display:flex; align-items:center; gap:4px; }
.sync-dot { width:6px; height:6px; border-radius:50%; background:#2ECC8F; }
.sync-dot.syncing { background:var(--amber); animation:blink 1s infinite; }
.sync-dot.error { background:var(--red); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-thumb { background:var(--purple-l); border-radius:2px; }
</style>
</head>
<body>

<header class="header">
  <div class="header-brand">
    <div class="header-logo">💪</div>
    <div>
      <h1>IA TrainLog</h1>
      <p id="syncStatus">מתחבר...</p>
    </div>
  </div>
  <div class="header-actions">
    <div class="header-date" onclick="openDatePicker()" id="headerDate">היום</div>
  </div>
</header>

<div class="tabs-bar">
  <button class="tab-btn active" onclick="switchTab('log',this)">📋 רישום</button>
  <button class="tab-btn" onclick="switchTab('history',this)">📅 היסטוריה</button>
  <button class="tab-btn" onclick="switchTab('alerts',this)">⚠️ התראות</button>
  <button class="tab-btn" onclick="switchTab('leads',this)">📥 פניות</button>
  <button class="tab-btn" onclick="switchTab('report',this)">📊 דוח</button>
</div>

<div class="main">

  <div id="tab-log">
    <div class="today-banner">
      <div class="left">
        <h2>אימונים שנרשמו</h2>
        <div class="date-big" id="bannerDate"></div>
      </div>
      <div class="right">
        <div class="count-big" id="todayCount">0</div>
        <div class="count-lbl">היום</div>
      </div>
    </div>
    <div class="section-title">
      מתאמנות פעילות
      <button class="btn-add-client" onclick="openAddClient()">+ מתאמן/ת חדש/ה</button>
    </div>
    <div id="clientCards"></div>
  </div>

  <div id="tab-history" style="display:none">
    <div class="section-title">כל האימונים שנרשמו</div>
    <div id="historyList"></div>
  </div>

  <div id="tab-alerts" style="display:none">
    <div class="section-title">חבילות שדורשות תשומת לב</div>
    <div id="alertsList"></div>
  </div>

  <div id="tab-leads" style="display:none">
    <div class="section-title">פניות</div>
    <button onclick="openAddLead()" class="btn-primary" style="margin-bottom:16px;">+ פנייה חדשה</button>
    <div id="leadsList"></div>
  </div>

  <div id="tab-report" style="display:none">
    <div class="section-title">דוח חודשי</div>
    <div id="reportContent"></div>
    <button onclick="exportReport()" class="btn-primary" style="margin-top:16px;">📥 ייצוא Excel</button>
  </div>

</div>

<div class="toast-container" id="toastContainer"></div>

<!-- SESSIONS MODAL -->
<div class="modal-overlay" id="sessionsModal" onclick="closeModal('sessionsModal',event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="modalTitle"></h2>
    <div class="modal-subtitle" id="modalSubtitle"></div>
    <div id="modalPayment" style="margin:8px 0;padding:10px 14px;background:var(--purple-ll);border-radius:var(--radius-sm);font-size:13px;"></div>
    <div id="modalEstimate" style="margin:6px 0;padding:8px 14px;background:var(--green-l);border-radius:var(--radius-sm);font-size:12px;color:#1A9B6C;"></div>
    <div style="display:flex;gap:8px;margin-bottom:12px;margin-top:12px;">
      <button onclick="openEditClient(currentClientIdx)" style="flex:1;padding:10px;background:var(--purple-l);color:var(--purple-d);border:none;border-radius:var(--radius-sm);font-family:'Heebo',sans-serif;font-size:13px;font-weight:600;cursor:pointer;">✏️ עריכה</button>
      <button onclick="openNewPackage(currentClientIdx)" style="flex:1;padding:10px;background:var(--green-l);color:#1A9B6C;border:none;border-radius:var(--radius-sm);font-family:'Heebo',sans-serif;font-size:13px;font-weight:600;cursor:pointer;">📦 חבילה חדשה</button>
      <button onclick="openUpdatePayment(currentClientIdx)" style="flex:1;padding:10px;background:var(--amber-l);color:#C07D00;border:none;border-radius:var(--radius-sm);font-family:'Heebo',sans-serif;font-size:13px;font-weight:600;cursor:pointer;">💳 תשלום</button>
    </div>
    <div class="modal-sessions" id="modalSessions"></div>
    <button class="btn-modal-close" onclick="closeModal('sessionsModal')">סגירה</button>
  </div>
</div>

<!-- ADD/EDIT CLIENT MODAL -->
<div class="modal-overlay" id="clientModal" onclick="closeModal('clientModal',event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="clientModalTitle">מתאמן/ת חדש/ה</h2>
    <div class="field-group">
      <input id="cf_name" placeholder="שם מלא" />
      <div class="field-row">
        <select id="cf_pkg">
          <option value="8">חבילה 8 אימונים – ₪1,600</option>
          <option value="24" selected>חבילה 24 אימונים – ₪4,440</option>
          <option value="0">ליווי מרחוק – ₪450/חודש</option>
          <option value="custom">מותאם אישית</option>
        </select>
        <select id="cf_freq">
          <option value="1×/שבוע">1× בשבוע</option>
          <option value="2×/שבוע" selected>2× בשבוע</option>
          <option value="3×/שבוע">3× בשבוע</option>
          <option value="4×/שבוע">4× בשבוע</option>
          <option value="אונליין">אונליין</option>
        </select>
      </div>
      <input id="cf_customPkg" placeholder="מספר אימונים מותאם" type="number" style="display:none;" />
      <div class="field-row">
        <input id="cf_totalPrice" placeholder="מחיר כולל ₪" type="number" />
        <input id="cf_paid" placeholder="שולם עד כה ₪" type="number" />
      </div>
      <select id="cf_channel">
        <option value="Grow">Grow</option>
        <option value="העברה בנקאית">העברה בנקאית</option>
        <option value="מזומן">מזומן</option>
      </select>
      <select id="cf_color">
        <option value="#7B5EA7">סגול</option>
        <option value="#E8445A">אדום</option>
        <option value="#3498DB">כחול</option>
        <option value="#2ECC8F">ירוק</option>
        <option value="#F5A623">כתום</option>
        <option value="#9B59B6">סגול כהה</option>
        <option value="#1ABC9C">טורקיז</option>
      </select>
      <input id="cf_note" placeholder="הערות (אופציונלי)" />
    </div>
    <button onclick="saveClient()" class="btn-primary" id="clientSaveBtn">שמירה</button>
    <button id="clientDeleteBtn" onclick="deleteClient()" class="btn-danger" style="display:none;">🗑️ מחיקת מתאמן/ת</button>
    <button class="btn-modal-close" onclick="closeModal('clientModal')">ביטול</button>
  </div>
</div>

<!-- NEW PACKAGE MODAL -->
<div class="modal-overlay" id="newPkgModal" onclick="closeModal('newPkgModal',event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>📦 חבילה חדשה</h2>
    <div class="modal-subtitle" id="newPkgSubtitle"></div>
    <div class="field-group">
      <select id="np_pkg">
        <option value="8">חבילה 8 אימונים – ₪1,600</option>
        <option value="24" selected>חבילה 24 אימונים – ₪4,440</option>
        <option value="custom">מותאם אישית</option>
      </select>
      <input id="np_customPkg" placeholder="מספר אימונים" type="number" style="display:none;" />
      <div class="field-row">
        <input id="np_totalPrice" placeholder="מחיר כולל ₪" type="number" />
        <input id="np_paid" placeholder="שולם עד כה ₪" type="number" />
      </div>
    </div>
    <button onclick="saveNewPackage()" class="btn-primary">פתיחת חבילה חדשה</button>
    <button class="btn-modal-close" onclick="closeModal('newPkgModal')">ביטול</button>
  </div>
</div>

<!-- UPDATE PAYMENT MODAL -->
<div class="modal-overlay" id="paymentModal" onclick="closeModal('paymentModal',event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>💳 עדכון תשלום</h2>
    <div class="modal-subtitle" id="paymentSubtitle"></div>
    <div class="field-group">
      <input id="pm_amount" placeholder="סכום שנוסף ₪" type="number" />
      <select id="pm_channel">
        <option value="Grow">Grow</option>
        <option value="העברה בנקאית">העברה בנקאית</option>
        <option value="מזומן">מזומן</option>
      </select>
    </div>
    <button onclick="savePayment()" class="btn-primary">עדכון</button>
    <button class="btn-modal-close" onclick="closeModal('paymentModal')">ביטול</button>
  </div>
</div>

<!-- ADD LEAD MODAL -->
<div class="modal-overlay" id="addLeadModal" onclick="closeModal('addLeadModal',event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>📥 פנייה חדשה</h2>
    <div class="field-group">
      <input id="leadName" placeholder="שם מלא" />
      <input id="leadPhone" placeholder="טלפון" type="tel" />
      <select id="leadSource">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyACMOh2RTaXldBl9jC-Rsu_Eq4nwkhXlYU",
  authDomain: "ia-trainlog.firebaseapp.com",
  databaseURL: "https://ia-trainlog-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "ia-trainlog",
  storageBucket: "ia-trainlog.firebasestorage.app",
  messagingSenderId: "684659114433",
  appId: "1:684659114433:web:1609430378058054f36f40"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const dbRef = ref(db, 'inbar/trainlog');

window._fbSet = (data) => set(dbRef, data);
window._fbListen = (cb) => onValue(dbRef, snap => cb(snap.val()));

window._fbListen((val) => {
  if (val) {
    window.DB = val;
    if (!window.DB.leads) window.DB.leads = [];
  } else {
    window.DB = window._getDefaultData();
    window._fbSet(window.DB);
  }
  document.getElementById('syncStatus').textContent = 'מסונכרן ✓';
  window.renderCards();
  window.renderAlerts();
});
</script>

<script>
// ── DEFAULTS ──────────────────────────────────────────────────────────────────
window._getDefaultData = function() {
  return {
    clients: [
      {id:1,name:'נגה צוקרמן',freq:'3×/שבוע',pkg:24,done:15,color:'#7B5EA7',sessions:[],paid:4440,totalPrice:4440,note:''},
      {id:2,name:'יעל אלהרר',freq:'1×/שבוע',pkg:24,done:15,color:'#E8445A',sessions:[],paid:3600,totalPrice:4440,note:''},
      {id:3,name:'איגור גרמן',freq:'2×/שבוע',pkg:24,done:13,color:'#3498DB',sessions:[],paid:3500,totalPrice:4440,note:''},
      {id:4,name:'יעל אלייה',freq:'אונליין',pkg:0,done:0,color:'#9B59B6',sessions:[],paid:900,totalPrice:450,note:'הו״ק חודשי'},
      {id:5,name:'רוני + רונית בן סימון',freq:'4×/שבוע',pkg:56,done:31,color:'#F5A623',sessions:[],paid:10000,totalPrice:10000,note:''},
      {id:6,name:'נסרין',freq:'2×/שבוע',pkg:24,done:2,color:'#2ECC8F',sessions:[],paid:4320,totalPrice:4320,note:''},
      {id:7,name:'אדם',freq:'1×/שבוע',pkg:8,done:2,color:'#E67E22',sessions:[],paid:800,totalPrice:1600,note:''},
      {id:8,name:'רונן גורלנד',freq:'2×/שבוע',pkg:6,done:3,color:'#1ABC9C',sessions:[],paid:1050,totalPrice:1050,note:'חבילות קצרות'},
    ],
    leads: []
  };
};

window.DB = window._getDefaultData();
let selectedDate = new Date();
let currentClientIdx = null;
let editingClientId = null;

// ── HELPERS ───────────────────────────────────────────────────────────────────
const DAYS_HE = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
const MONTHS_HE = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];

function fmtDate(d) { return `${DAYS_HE[d.getDay()]} ${d.getDate()} ב${MONTHS_HE[d.getMonth()]}`; }
function fmtDateShort(iso) { const d=new Date(iso+'T12:00:00'); return `${d.getDate()}.${d.getMonth()+1}.${String(d.getFullYear()).slice(2)}`; }
function toISO(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function todayISO() { return toISO(selectedDate); }
function getInitials(n) { return n.split(' ').map(w=>w[0]).join('').slice(0,2); }
function sessionsOnDate(c,iso) { return c.sessions.filter(s=>s.date===iso).length; }

function saveData() {
  localStorage.setItem('ia_trainlog_v3', JSON.stringify(DB));
  if (window._fbSet) {
    document.getElementById('syncStatus').textContent = 'מסנכרן...';
    window._fbSet(DB).then(()=>{
      document.getElementById('syncStatus').textContent = 'מסונכרן ✓';
    }).catch(()=>{
      document.getElementById('syncStatus').textContent = 'שגיאת סנכרון';
    });
  }
}

function estimatedFinish(c) {
  const done = (c.done||0) + c.sessions.length;
  const remaining = c.pkg - done;
  if (remaining <= 0 || !c.freq) return null;
  const perWeek = parseInt(c.freq) || 2;
  const weeks = Math.ceil(remaining / perWeek);
  const d = new Date();
  d.setDate(d.getDate() + weeks * 7);
  return `${d.getDate()} ${MONTHS_HE[d.getMonth()]} ${d.getFullYear()}`;
}

// ── RENDER CARDS ─────────────────────────────────────────────────────────────
window.renderCards = function() {
  const container = document.getElementById('clientCards');
  if (!container) return;
  const isoToday = todayISO();
  let todayTotal = 0;

  container.innerHTML = DB.clients.map((c,idx) => {
    const done = (c.done||0) + c.sessions.length;
    const remaining = c.pkg > 0 ? c.pkg - done : null;
    const pct = c.pkg > 0 ? Math.min(100, done/c.pkg*100) : 0;
    const alreadyToday = sessionsOnDate(c, isoToday);
    if (alreadyToday > 0) todayTotal++;

    let badgeHtml='', btnClass='';
    if (c.pkg===0) {
      badgeHtml=`<span class="badge badge-online">אונליין</span>`;
    } else if (remaining<=0) {
      badgeHtml=`<span class="badge badge-danger">🚨 נגמרה</span>`; btnClass='danger-state';
    } else if (remaining<=3) {
      badgeHtml=`<span class="badge badge-danger">⚠️ נשארו ${remaining}</span>`; btnClass='danger-state';
    } else if (remaining<=6) {
      badgeHtml=`<span class="badge badge-warn">נשארו ${remaining}</span>`; btnClass='warn-state';
    } else {
      badgeHtml=`<span class="badge badge-ok">נשארו ${remaining}</span>`;
    }

    const lastSession = c.sessions.length>0 ? fmtDateShort(c.sessions[c.sessions.length-1].date) : 'טרם נרשם';
    const doneAlready = alreadyToday>0 ? `<span style="font-size:11px;color:var(--green);font-weight:600">✓ נרשם היום</span>` : '';
    const owed = c.totalPrice - (c.paid||0);
    const payBadge = owed>0 ? `<span style="font-size:10px;color:var(--red);font-weight:600">חוב ₪${owed.toLocaleString()}</span>` : '';

    return `<div class="client-card" onclick="openSessions(${idx})">
      <div class="client-card-inner">
        <div class="client-avatar" style="background:${c.color}">${getInitials(c.name)}</div>
        <div class="client-info">
          <div class="client-name">${c.name}</div>
          <div class="client-meta">
            <span>${c.freq}</span>
            ${c.pkg>0?`<span class="sep"></span><span>${done}/${c.pkg}</span>`:''}
            <span class="sep"></span>${badgeHtml}
            ${payBadge?`<span class="sep"></span>${payBadge}`:''}
          </div>
          <div class="client-meta" style="margin-top:3px">
            <span>אחרון: ${lastSession}</span>${doneAlready?`<span class="sep"></span>${doneAlready}`:''}
          </div>
        </div>
        <button class="btn-log ${btnClass}" onclick="logSession(event,${idx})">+</button>
      </div>
      ${c.pkg>0?`<div class="progress-wrap"><div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${pct>=90?'var(--red)':pct>=75?'var(--amber)':c.color}"></div></div></div>`:''}
    </div>`;
  }).join('');

  document.getElementById('todayCount').textContent = todayTotal;
  document.getElementById('bannerDate').textContent = fmtDate(selectedDate);
  document.getElementById('headerDate').textContent = fmtDate(selectedDate);
};

// ── LOG SESSION ───────────────────────────────────────────────────────────────
function logSession(e, idx) {
  e.stopPropagation();
  const c = DB.clients[idx];
  const iso = todayISO();
  const sessionNum = (c.done||0) + c.sessions.length + 1;
  c.sessions.push({ date: iso, num: sessionNum });
  saveData();
  renderCards();
  renderHistory();
  renderAlerts();
  const btn = e.currentTarget;
  btn.classList.add('logging');
  setTimeout(()=>btn.classList.remove('logging'),400);
  const totalDone = (c.done||0)+c.sessions.length;
  const remaining = c.pkg>0 ? c.pkg-totalDone : null;
  showToast(`✅ ${c.name} — אימון ${sessionNum}${c.pkg>0?' מתוך '+c.pkg:''}`, c.color);
  if (remaining!==null && remaining<=3 && remaining>0) setTimeout(()=>showToast(`⚠️ נשארו ${remaining} אימונים!`,'var(--amber)'),700);
  if (remaining===0) setTimeout(()=>showToast('🚨 החבילה נגמרה! זמן לחידוש.','var(--red)'),700);
}

// ── SESSIONS MODAL ────────────────────────────────────────────────────────────
function openSessions(idx) {
  currentClientIdx = idx;
  const c = DB.clients[idx];
  const done = (c.done||0)+c.sessions.length;
  const remaining = c.pkg>0 ? c.pkg-done : null;
  document.getElementById('modalTitle').textContent = c.name;
  document.getElementById('modalSubtitle').textContent = c.pkg>0 ? `${done} בוצעו · ${remaining} נשארו מתוך ${c.pkg}` : 'ליווי חודשי';

  const payDiv = document.getElementById('modalPayment');
  if (c.totalPrice) {
    const owed = c.totalPrice-(c.paid||0);
    payDiv.innerHTML = `💳 שולם: <strong>₪${(c.paid||0).toLocaleString()}</strong> מתוך ₪${c.totalPrice.toLocaleString()} ${owed>0?`· <span style="color:var(--red)">נשאר לשלם: ₪${owed.toLocaleString()}</span>`:'· <span style="color:var(--green)">✓ שולם במלואו</span>'}`;
    payDiv.style.display='block';
  } else { payDiv.style.display='none'; }

  const estDiv = document.getElementById('modalEstimate');
  if (c.pkg>0 && remaining>0) {
    const est = estimatedFinish(c);
    estDiv.textContent = est ? `📅 צפי סיום: ${est}` : '';
    estDiv.style.display = est ? 'block' : 'none';
  } else { estDiv.style.display='none'; }

  const container = document.getElementById('modalSessions');
  if (c.sessions.length===0) {
    container.innerHTML='<div class="modal-empty">אין אימונים רשומים עדיין</div>';
  } else {
    container.innerHTML=[...c.sessions].reverse().map((s,ri)=>{
      const realIdx=c.sessions.length-1-ri;
      return `<div class="session-row">
        <span class="snum">#${s.num}</span>
        <span style="flex:1;font-size:13px;font-weight:500">${fmtDateShort(s.date)}</span>
        <span style="font-size:11px;color:var(--ink3)">${getDayName(s.date)}</span>
        <button class="sdel" onclick="deleteSession(${idx},${realIdx})">✕</button>
      </div>`;
    }).join('');
  }
  document.getElementById('sessionsModal').classList.add('open');
}

function getDayName(iso) { const d=new Date(iso+'T12:00:00'); return DAYS_HE[d.getDay()]; }

// ── ADD / EDIT CLIENT ─────────────────────────────────────────────────────────
function openAddClient() {
  editingClientId = null;
  document.getElementById('clientModalTitle').textContent = 'מתאמן/ת חדש/ה';
  document.getElementById('cf_name').value='';
  document.getElementById('cf_pkg').value='24';
  document.getElementById('cf_freq').value='2×/שבוע';
  document.getElementById('cf_totalPrice').value='4440';
  document.getElementById('cf_paid').value='';
  document.getElementById('cf_channel').value='Grow';
  document.getElementById('cf_color').value='#7B5EA7';
  document.getElementById('cf_note').value='';
  document.getElementById('cf_customPkg').style.display='none';
  document.getElementById('clientDeleteBtn').style.display='none';
  document.getElementById('clientSaveBtn').textContent='הוספה';
  document.getElementById('clientModal').classList.add('open');
}

function openEditClient(idx) {
  closeModal('sessionsModal');
  const c = DB.clients[idx];
  editingClientId = c.id;
  document.getElementById('clientModalTitle').textContent = `עריכה | ${c.name}`;
  document.getElementById('cf_name').value=c.name;
  document.getElementById('cf_pkg').value=c.pkg;
  document.getElementById('cf_freq').value=c.freq;
  document.getElementById('cf_totalPrice').value=c.totalPrice||'';
  document.getElementById('cf_paid').value=c.paid||'';
  document.getElementById('cf_color').value=c.color;
  document.getElementById('cf_note').value=c.note||'';
  document.getElementById('cf_customPkg').style.display='none';
  document.getElementById('clientDeleteBtn').style.display='block';
  document.getElementById('clientSaveBtn').textContent='שמירת שינויים';
  document.getElementById('clientModal').classList.add('open');
}

function saveClient() {
  const name = document.getElementById('cf_name').value.trim();
  if (!name) { showToast('חסר שם!','var(--red)'); return; }
  let pkg = parseInt(document.getElementById('cf_pkg').value)||0;
  if (document.getElementById('cf_pkg').value==='custom') pkg=parseInt(document.getElementById('cf_customPkg').value)||0;
  const totalPrice = parseFloat(document.getElementById('cf_totalPrice').value)||0;
  const paid = parseFloat(document.getElementById('cf_paid').value)||0;

  if (editingClientId!==null) {
    const c = DB.clients.find(x=>x.id===editingClientId);
    if (c) {
      c.name=name; c.freq=document.getElementById('cf_freq').value;
      c.pkg=pkg; c.totalPrice=totalPrice; c.paid=paid;
      c.color=document.getElementById('cf_color').value;
      c.note=document.getElementById('cf_note').value;
    }
    showToast('✅ פרטים עודכנו','var(--green)');
  } else {
    const newId = Date.now();
    DB.clients.push({
      id:newId, name, freq:document.getElementById('cf_freq').value,
      pkg, done:0, color:document.getElementById('cf_color').value,
      sessions:[], paid, totalPrice, note:document.getElementById('cf_note').value
    });
    showToast(`✅ ${name} נוסף/ה`,'var(--purple)');
  }
  saveData(); renderCards(); renderAlerts();
  closeModal('clientModal');
}

function deleteClient() {
  if (!confirm('למחוק את המתאמן/ת?')) return;
  DB.clients = DB.clients.filter(c=>c.id!==editingClientId);
  saveData(); renderCards(); renderAlerts();
  closeModal('clientModal');
  showToast('🗑️ מתאמן/ת נמחק/ה','#888');
}

// ── NEW PACKAGE ───────────────────────────────────────────────────────────────
function openNewPackage(idx) {
  closeModal('sessionsModal');
  currentClientIdx = idx;
  const c = DB.clients[idx];
  document.getElementById('newPkgSubtitle').textContent = c.name;
  document.getElementById('np_pkg').value='24';
  document.getElementById('np_totalPrice').value='4440';
  document.getElementById('np_paid').value='';
  document.getElementById('np_customPkg').style.display='none';
  document.getElementById('newPkgModal').classList.add('open');
}

function saveNewPackage() {
  const c = DB.clients[currentClientIdx];
  let pkg = parseInt(document.getElementById('np_pkg').value)||24;
  if (document.getElementById('np_pkg').value==='custom') pkg=parseInt(document.getElementById('np_customPkg').value)||24;
  const totalPrice = parseFloat(document.getElementById('np_totalPrice').value)||0;
  const paid = parseFloat(document.getElementById('np_paid').value)||0;
  // Archive old sessions into done
  c.done = (c.done||0) + c.sessions.length;
  c.sessions = [];
  c.pkg = pkg;
  c.totalPrice = totalPrice;
  c.paid = paid;
  saveData(); renderCards(); renderAlerts();
  closeModal('newPkgModal');
  showToast(`📦 חבילה חדשה נפתחה ל${c.name}`,'var(--green)');
}

// ── UPDATE PAYMENT ────────────────────────────────────────────────────────────
function openUpdatePayment(idx) {
  closeModal('sessionsModal');
  currentClientIdx = idx;
  const c = DB.clients[idx];
  const owed = (c.totalPrice||0)-(c.paid||0);
  document.getElementById('paymentSubtitle').textContent = `${c.name} · נשאר לשלם: ₪${owed.toLocaleString()}`;
  document.getElementById('pm_amount').value='';
  document.getElementById('paymentModal').classList.add('open');
}

function savePayment() {
  const c = DB.clients[currentClientIdx];
  const amount = parseFloat(document.getElementById('pm_amount').value)||0;
  if (!amount) { showToast('הכניסי סכום','var(--red)'); return; }
  c.paid = (c.paid||0) + amount;
  if (c.paid > c.totalPrice) c.paid = c.totalPrice;
  saveData(); renderCards();
  closeModal('paymentModal');
  const owed = c.totalPrice - c.paid;
  showToast(owed<=0 ? `✅ ${c.name} שילם/ה במלואו!` : `💳 עודכן תשלום ₪${amount.toLocaleString()}`,'var(--green)');
}

// ── DELETE SESSION ────────────────────────────────────────────────────────────
function deleteSession(clientIdx, sessionIdx) {
  const c = DB.clients[clientIdx];
  c.sessions.splice(sessionIdx,1);
  c.sessions.forEach((s,i)=>s.num=(c.done||0)+i+1);
  saveData(); openSessions(clientIdx); renderCards(); renderHistory(); renderAlerts();
  showToast('🗑️ אימון נמחק','#888');
}

// ── HISTORY ───────────────────────────────────────────────────────────────────
function renderHistory() {
  const container = document.getElementById('historyList');
  if (!container) return;
  const all=[];
  DB.clients.forEach(c=>c.sessions.forEach(s=>all.push({date:s.date,num:s.num,client:c})));
  if (all.length===0) { container.innerHTML='<div class="empty-state"><div class="e-icon">📋</div><p>אין אימונים עדיין</p></div>'; return; }
  all.sort((a,b)=>b.date.localeCompare(a.date));
  const groups={};
  all.forEach(s=>{ if(!groups[s.date])groups[s.date]=[]; groups[s.date].push(s); });
  container.innerHTML=Object.entries(groups).map(([date,sessions])=>{
    const d=new Date(date+'T12:00:00');
    const label=`${DAYS_HE[d.getDay()]} · ${d.getDate()} ${MONTHS_HE[d.getMonth()]} ${d.getFullYear()}`;
    return `<div class="history-day">
      <div class="history-day-header">${label}</div>
      ${sessions.map(s=>`<div class="history-entry">
        <div class="h-dot" style="background:${s.client.color}"></div>
        <div class="h-name">${s.client.name}</div>
        <div class="h-num">אימון ${s.num}${s.client.pkg>0?' / '+s.client.pkg:''}</div>
      </div>`).join('')}
    </div>`;
  }).join('');
}

// ── ALERTS ────────────────────────────────────────────────────────────────────
window.renderAlerts = function() {
  const container = document.getElementById('alertsList');
  if (!container) return;
  const alerts = DB.clients
    .filter(c=>c.pkg>0)
    .map(c=>({...c,totalDone:(c.done||0)+c.sessions.length,remaining:c.pkg-((c.done||0)+c.sessions.length)}))
    .filter(c=>c.remaining<=6)
    .sort((a,b)=>a.remaining-b.remaining);
  if (alerts.length===0) { container.innerHTML='<div class="empty-state"><div class="e-icon">🎉</div><p>אין התראות — הכל בסדר!</p></div>'; return; }
  container.innerHTML=alerts.map(c=>{
    const isDanger=c.remaining<=3;
    const est=c.remaining>0?estimatedFinish(c):null;
    return `<div class="alert-card ${isDanger?'danger':'warn'}">
      <div class="a-icon">${isDanger?'🚨':'⚠️'}</div>
      <div>
        <div class="a-name">${c.name}</div>
        <div class="a-text">${c.freq} · ${c.totalDone}/${c.pkg} בוצעו${est?' · צפי: '+est:''}</div>
      </div>
      <div class="a-right"><div class="a-num">${c.remaining}</div><div class="a-sub">נשאר</div></div>
    </div>`;
  }).join('');
};

// ── LEADS ─────────────────────────────────────────────────────────────────────
function openAddLead() { document.getElementById('addLeadModal').classList.add('open'); }
function saveLead() {
  const name=document.getElementById('leadName').value.trim();
  if (!name) { showToast('חסר שם!','var(--red)'); return; }
  DB.leads.push({id:Date.now(),name,phone:document.getElementById('leadPhone').value.trim(),source:document.getElementById('leadSource').value,status:document.getElementById('leadStatus').value,note:document.getElementById('leadNote').value.trim(),date:todayISO()});
  saveData(); closeModal('addLeadModal'); renderLeads();
  showToast(`✅ ${name} נוספ/ה`,'var(--purple)');
}
function updateLeadStatus(id,s) { const l=DB.leads.find(x=>x.id===id); if(l){l.status=s;saveData();renderLeads();} }
function deleteLead(id) { DB.leads=DB.leads.filter(l=>l.id!==id); saveData(); renderLeads(); showToast('🗑️ נמחק','#888'); }
function renderLeads() {
  const c=document.getElementById('leadsList');
  if (!c) return;
  if (!DB.leads||!DB.leads.length) { c.innerHTML='<div class="empty-state"><div class="e-icon">📥</div><p>אין פניות עדיין</p></div>'; return; }
  const sc={'ליד חדש':'var(--purple)','נקבע היכרות':'var(--amber)','שילם היכרות':'var(--amber)','סגר חבילה':'var(--green)','לא ממשיך':'#aaa'};
  c.innerHTML=[...DB.leads].sort((a,b)=>b.id-a.id).map(l=>`
    <div style="background:#fff;border-radius:var(--radius-md);padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow-sm);">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
        <div style="font-weight:700;font-size:15px">${l.name}</div>
        <button onclick="deleteLead(${l.id})" style="background:none;border:none;cursor:pointer;color:#ccc;font-size:16px;">✕</button>
      </div>
      ${l.phone?`<div style="font-size:13px;color:var(--ink3);margin-bottom:4px;">📞 ${l.phone}</div>`:''}
      ${l.source?`<div style="font-size:13px;color:var(--ink3);margin-bottom:4px;">📣 ${l.source}</div>`:''}
      ${l.note?`<div style="font-size:13px;color:var(--ink2);margin-bottom:6px;font-style:italic">${l.note}</div>`:''}
      <div style="display:flex;align-items:center;gap:8px;margin-top:8px;">
        <span style="font-size:12px;font-weight:600;color:${sc[l.status]||'var(--purple)'};background:${sc[l.status]||'var(--purple)'}22;padding:4px 10px;border-radius:20px;">${l.status}</span>
        <select onchange="updateLeadStatus(${l.id},this.value)" style="flex:1;padding:5px 8px;border-radius:20px;border:1.5px solid #e0daea;font-family:'Heebo',sans-serif;font-size:12px;background:#fff;direction:rtl;">
          <option ${l.status==='ליד חדש'?'selected':''}>ליד חדש</option>
          <option ${l.status==='נקבע היכרות'?'selected':''}>נקבע היכרות</option>
          <option ${l.status==='שילם היכרות'?'selected':''}>שילם היכרות 200₪</option>
          <option ${l.status==='סגר חבילה'?'selected':''}>סגר חבילה ✅</option>
          <option ${l.status==='לא ממשיך'?'selected':''}>לא ממשיך</option>
        </select>
      </div>
      <div style="font-size:11px;color:var(--ink3);margin-top:6px;">${fmtDateShort(l.date)}</div>
    </div>`).join('');
}

// ── REPORT ────────────────────────────────────────────────────────────────────
function renderReport() {
  const now = new Date();
  const monthStr = `${MONTHS_HE[now.getMonth()]} ${now.getFullYear()}`;
  const isoMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

  let totalSessions=0, totalRevenue=0, totalOwed=0;
  const rows = DB.clients.map(c=>{
    const done=(c.done||0)+c.sessions.length;
    const thisMonth=c.sessions.filter(s=>s.date.startsWith(isoMonth)).length;
    const remaining=c.pkg>0?c.pkg-done:null;
    const owed=(c.totalPrice||0)-(c.paid||0);
    totalSessions+=thisMonth;
    totalRevenue+=(c.paid||0);
    totalOwed+=owed;
    const status=remaining!==null&&remaining<=3?'🔴 מסיים בקרוב':remaining===0?'🚨 נגמר':'🟢 פעיל';
    return `<tr>
      <td style="padding:10px 12px;font-weight:600;">${c.name}</td>
      <td style="padding:10px 12px;text-align:center;">${done}${c.pkg>0?' / '+c.pkg:''}</td>
      <td style="padding:10px 12px;text-align:center;">${thisMonth}</td>
      <td style="padding:10px 12px;text-align:center;">₪${(c.paid||0).toLocaleString()}</td>
      <td style="padding:10px 12px;text-align:center;color:${owed>0?'var(--red)':'var(--green)'};">₪${owed.toLocaleString()}</td>
      <td style="padding:10px 12px;text-align:center;">${remaining!==null?remaining:'—'}</td>
      <td style="padding:10px 12px;text-align:center;">${status}</td>
    </tr>`;
  });

  document.getElementById('reportContent').innerHTML=`
    <div style="background:var(--surface);border-radius:var(--radius-lg);padding:16px;margin-bottom:16px;box-shadow:var(--shadow-sm);">
      <div style="font-size:16px;font-weight:800;margin-bottom:16px;">דוח ${monthStr}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px;">
        <div style="text-align:center;background:var(--purple-ll);border-radius:var(--radius-md);padding:12px;">
          <div style="font-size:22px;font-weight:900;color:var(--purple);">${totalSessions}</div>
          <div style="font-size:11px;color:var(--ink3);">אימונים החודש</div>
        </div>
        <div style="text-align:center;background:var(--green-l);border-radius:var(--radius-md);padding:12px;">
          <div style="font-size:20px;font-weight:900;color:var(--green);">₪${totalRevenue.toLocaleString()}</div>
          <div style="font-size:11px;color:var(--ink3);">שולם סה"כ</div>
        </div>
        <div style="text-align:center;background:var(--red-l);border-radius:var(--radius-md);padding:12px;">
          <div style="font-size:20px;font-weight:900;color:var(--red);">₪${totalOwed.toLocaleString()}</div>
          <div style="font-size:11px;color:var(--ink3);">חובות פתוחים</div>
        </div>
      </div>
      <div style="overflow-x:auto;">
        <table style="width:100%;border-collapse:collapse;font-size:13px;direction:rtl;">
          <thead>
            <tr style="background:var(--purple);color:#fff;">
              <th style="padding:10px 12px;text-align:right;">שם</th>
              <th style="padding:10px 12px;">בוצעו</th>
              <th style="padding:10px 12px;">החודש</th>
              <th style="padding:10px 12px;">שולם</th>
              <th style="padding:10px 12px;">חוב</th>
              <th style="padding:10px 12px;">נשאר</th>
              <th style="padding:10px 12px;">סטטוס</th>
            </tr>
          </thead>
          <tbody>${rows.join('')}</tbody>
        </table>
      </div>
    </div>`;
}

function exportReport() {
  const now = new Date();
  const monthStr = `${MONTHS_HE[now.getMonth()]} ${now.getFullYear()}`;
  const isoMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

  const wb = XLSX.utils.book_new();

  // Sheet 1: Summary
  const summaryData = [
    ['דוח חודשי – IA TrainLog', '', '', '', '', '', ''],
    ['חודש:', monthStr, '', '', '', '', ''],
    ['תאריך הפקה:', new Date().toLocaleDateString('he-IL'), '', '', '', '', ''],
    ['','','','','','',''],
    ['שם','אימונים שבוצעו','אימונים החודש','שולם סה״כ','נשאר לשלם','נשאר בחבילה','סטטוס']
  ];

  let totalSessions=0, totalRevenue=0, totalOwed=0;
  DB.clients.forEach(c=>{
    const done=(c.done||0)+c.sessions.length;
    const thisMonth=c.sessions.filter(s=>s.date.startsWith(isoMonth)).length;
    const remaining=c.pkg>0?c.pkg-done:'—';
    const owed=(c.totalPrice||0)-(c.paid||0);
    totalSessions+=thisMonth;
    totalRevenue+=(c.paid||0);
    totalOwed+=owed;
    const status=typeof remaining==='number'&&remaining<=3?'מסיים בקרוב':remaining===0?'נגמרה החבילה':'פעיל';
    summaryData.push([c.name,done,thisMonth,(c.paid||0),owed,remaining,status]);
  });

  summaryData.push(['','','','','','','']);
  summaryData.push(['סה"כ','',totalSessions,totalRevenue,totalOwed,'','']);

  // Sheet 2: All sessions
  const sessionsData = [['שם לקוח','תאריך','יום','מספר אימון','בחבילה']];
  const allSessions=[];
  DB.clients.forEach(c=>c.sessions.forEach(s=>allSessions.push({name:c.name,date:s.date,num:s.num,pkg:c.pkg,color:c.color})));
  allSessions.sort((a,b)=>b.date.localeCompare(a.date));
  allSessions.forEach(s=>{
    const d=new Date(s.date+'T12:00:00');
    sessionsData.push([s.name,fmtDateShort(s.date),DAYS_HE[d.getDay()],s.num,s.pkg||'אונליין']);
  });

  const ws1=XLSX.utils.aoa_to_sheet(summaryData);
  const ws2=XLSX.utils.aoa_to_sheet(sessionsData);
  ws1['!cols']=[{wch:20},{wch:12},{wch:12},{wch:12},{wch:14},{wch:12},{wch:16}];
  ws2['!cols']=[{wch:22},{wch:12},{wch:10},{wch:12},{wch:10}];
  XLSX.utils.book_append_sheet(wb,ws1,'סיכום חודשי');
  XLSX.utils.book_append_sheet(wb,ws2,'כל האימונים');
  XLSX.writeFile(wb,`IA_TrainLog_${monthStr}.xlsx`);
  showToast('📥 הדוח יורד...','var(--green)');
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function switchTab(tab,btn) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ['log','history','alerts','leads','report'].forEach(t=>{
    document.getElementById('tab-'+t).style.display=t===tab?'block':'none';
  });
  if (tab==='history') renderHistory();
  if (tab==='alerts') renderAlerts();
  if (tab==='leads') renderLeads();
  if (tab==='report') renderReport();
}

// ── MODALS ────────────────────────────────────────────────────────────────────
function closeModal(id,e) {
  if (e && e.target!==document.getElementById(id)) return;
  document.getElementById(id).classList.remove('open');
}

// ── DATE PICKER ───────────────────────────────────────────────────────────────
function openDatePicker() {
  document.getElementById('datePickerInput').value=toISO(selectedDate);
  document.getElementById('datePickerModal').classList.add('open');
}
function closeDatePicker() { document.getElementById('datePickerModal').classList.remove('open'); }
function confirmDate() {
  const val=document.getElementById('datePickerInput').value;
  if (!val) return;
  selectedDate=new Date(val+'T12:00:00');
  closeDatePicker(); renderCards();
  showToast(`📅 ${fmtDate(selectedDate)}`,'var(--purple)');
}

// ── SELECT CHANGES ────────────────────────────────────────────────────────────
document.getElementById('cf_pkg').addEventListener('change',function(){
  const isCustom=this.value==='custom';
  document.getElementById('cf_customPkg').style.display=isCustom?'block':'none';
  const prices={'8':1600,'24':4440,'0':450};
  if (!isCustom) document.getElementById('cf_totalPrice').value=prices[this.value]||'';
});
document.getElementById('np_pkg').addEventListener('change',function(){
  const isCustom=this.value==='custom';
  document.getElementById('np_customPkg').style.display=isCustom?'block':'none';
  const prices={'8':1600,'24':4440};
  if (!isCustom) document.getElementById('np_totalPrice').value=prices[this.value]||'';
});

// ── TOAST ─────────────────────────────────────────────────────────────────────
function showToast(msg,color) {
  const c=document.getElementById('toastContainer');
  const t=document.createElement('div');
  t.className='toast';
  if (color) t.style.borderRight=`4px solid ${color}`;
  t.textContent=msg;
  c.appendChild(t);
  setTimeout(()=>{ t.classList.add('removing'); setTimeout(()=>t.remove(),250); },2600);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
renderCards();
renderAlerts();
</script>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>IA TrainLog</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#12111A;--ink2:#3D3A52;--ink3:#8B87A0;
  --bg:#F4F2FA;--surface:#FFFFFF;
  --purple:#7B5EA7;--purple-d:#4E3880;--purple-l:#EDE7F6;--purple-ll:#F7F4FD;
  --green:#2ECC8F;--green-l:#E6FAF3;
  --amber:#F5A623;--amber-l:#FEF6E6;
  --red:#E8445A;--red-l:#FDEDF0;
  --radius-lg:20px;--radius-md:14px;--radius-sm:10px;
  --shadow:0 8px 32px rgba(78,56,128,0.10);--shadow-sm:0 2px 10px rgba(78,56,128,0.08)
}
html,body{height:100%;font-family:'Heebo',sans-serif;background:var(--bg);color:var(--ink);direction:rtl;-webkit-font-smoothing:antialiased}
.header{background:var(--ink);padding:16px 20px 14px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
.header-brand{display:flex;align-items:center;gap:10px}
.header-logo{width:36px;height:36px;background:var(--purple);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px}
.header-brand h1{color:#fff;font-size:16px;font-weight:800}
.header-brand p{color:rgba(255,255,255,0.45);font-size:10px;margin-top:1px}
.header-actions{display:flex;gap:6px;align-items:center}
.header-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:5px 12px;color:rgba(255,255,255,0.85);font-size:11px;cursor:pointer;font-family:'Heebo',sans-serif;font-weight:500}
.tabs-bar{background:var(--ink);display:flex;padding:0 16px 14px;gap:4px;overflow-x:auto}
.tab-btn{padding:6px 12px;border-radius:20px;border:none;font-family:'Heebo',sans-serif;font-size:11px;font-weight:600;cursor:pointer;color:rgba(255,255,255,0.5);background:transparent;white-space:nowrap}
.tab-btn.active{background:var(--purple);color:#fff}
.main{padding:16px 16px 100px;max-width:520px;margin:0 auto}
.today-banner{background:linear-gradient(135deg,var(--purple-d),var(--purple));border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 6px 24px rgba(78,56,128,0.28)}
.today-banner .left h2{color:#fff;font-size:13px;font-weight:500;opacity:0.8}
.today-banner .left .date-big{color:#fff;font-size:22px;font-weight:900;letter-spacing:-1px;margin-top:2px}
.today-banner .right{text-align:center}
.today-banner .right .count-big{color:#fff;font-size:38px;font-weight:900;line-height:1}
.today-banner .right .count-lbl{color:rgba(255,255,255,0.65);font-size:10px;margin-top:2px}
.section-title{font-size:11px;font-weight:700;color:var(--ink3);letter-spacing:0.8px;text-transform:uppercase;margin:16px 0 10px;display:flex;align-items:center;justify-content:space-between}
.btn-add-client{background:var(--purple);color:#fff;border:none;border-radius:20px;padding:5px 12px;font-family:'Heebo',sans-serif;font-size:11px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent}
.client-card{background:var(--surface);border-radius:var(--radius-lg);margin-bottom:10px;box-shadow:var(--shadow-sm);overflow:hidden;border:1px solid rgba(123,94,167,0.06)}
.card-main{display:flex;align-items:center;padding:14px 16px;gap:12px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.client-avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0;color:#fff}
.client-info{flex:1;min-width:0}
.client-name{font-size:14px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.client-meta{font-size:11px;color:var(--ink3);margin-top:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.sep{width:3px;height:3px;border-radius:50%;background:var(--ink3);opacity:0.4;flex-shrink:0}
.client-note{font-size:10px;color:var(--amber);margin-top:3px;font-weight:600}
.progress-wrap{padding:0 16px 10px;cursor:pointer}
.progress-track{height:4px;background:var(--bg);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width 0.6s}
.btn-log{width:42px;height:42px;border-radius:50%;border:none;background:var(--purple);color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;box-shadow:0 4px 14px rgba(123,94,167,0.4);-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none;transition:transform 0.15s}
.btn-log:active{transform:scale(0.92)}
.btn-log.warn-state{background:var(--amber);box-shadow:0 4px 14px rgba(245,166,35,0.4)}
.btn-log.danger-state{background:var(--red);box-shadow:0 4px 14px rgba(232,68,90,0.4)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.badge-ok{background:var(--green-l);color:#1A9B6C}
.badge-warn{background:var(--amber-l);color:#C07D00}
.badge-danger{background:var(--red-l);color:#C0213A}
.badge-online{background:var(--purple-ll);color:var(--purple-d)}
.toast-container{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none}
.toast{background:var(--ink);color:#fff;padding:11px 20px;border-radius:40px;font-size:13px;font-weight:500;box-shadow:0 8px 30px rgba(0,0,0,0.25);animation:toast-in 0.3s cubic-bezier(0.34,1.56,0.64,1);white-space:nowrap}
.toast.removing{animation:toast-out 0.25s ease forwards}
@keyframes toast-in{from{opacity:0;transform:translateY(12px) scale(0.92)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes toast-out{from{opacity:1}to{opacity:0;transform:translateY(8px)}}
.modal-overlay{position:fixed;inset:0;background:rgba(18,17,26,0.6);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.25s;backdrop-filter:blur(3px)}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:22px 20px 34px;width:100%;max-width:520px;transform:translateY(40px);transition:transform 0.28s cubic-bezier(0.34,1.2,0.64,1);max-height:88vh;overflow-y:auto}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-handle{width:40px;height:4px;background:#E0DDF0;border-radius:2px;margin:0 auto 18px}
.modal h2{font-size:17px;font-weight:800;color:var(--ink);margin-bottom:4px}
.modal .modal-subtitle{font-size:12px;color:var(--ink3);margin-bottom:10px}
.modal-sessions{max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.session-row{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--bg);border-radius:var(--radius-sm);font-size:13px}
.session-row .snum{font-weight:700;color:var(--purple);min-width:26px}
.session-row .sdel{width:24px;height:24px;border-radius:50%;border:none;background:var(--red-l);color:var(--red);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.btn-modal-close{width:100%;padding:13px;background:var(--bg);border:none;border-radius:var(--radius-md);font-family:'Heebo',sans-serif;font-size:14px;font-weight:600;color:var(--ink2);cursor:pointer;margin-top:8px}
.field-group{display:flex;flex-direction:column;gap:9px;margin-top:12px}
.field-group input,.field-group select,.field-group textarea{padding:11px 13px;border-radius:var(--radius-sm);border:1.5px solid #e0daea;font-family:'Heebo',sans-serif;font-size:14px;direction:rtl;background:#fff;outline:none;transition:border 0.2s}
.field-group input:focus,.field-group select:focus{border-color:var(--purple)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.btn-primary{width:100%;padding:13px;background:var(--purple);color:#fff;border:none;border-radius:var(--radius-md);font-family:'Heebo',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:12px}
.btn-danger{width:100%;padding:11px;background:var(--red-l);color:var(--red);border:none;border-radius:var(--radius-md);font-family:'Heebo',sans-serif;font-size:13px;font-weight:600;cursor:pointer;margin-top:7px}
.btn-success{width:100%;padding:11px;background:var(--green-l);color:#1A9B6C;border:none;border-radius:var(--radius-md);font-family:'Heebo',sans-serif;font-size:13px;font-weight:600;cursor:pointer;margin-top:7px}
.action-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin:12px 0}
.action-btn{padding:9px 6px;border:none;border-radius:var(--radius-sm);font-family:'Heebo',sans-serif;font-size:12px;font-weight:600;cursor:pointer;text-align:center}
.history-day{margin-bottom:14px}
.history-day-header{font-size:11px;font-weight:700;color:var(--ink3);letter-spacing:0.5px;margin-bottom:7px;display:flex;align-items:center;gap:8px}
.history-day-header::after{content:'';flex:1;height:1px;background:var(--bg)}
.history-entry{display:flex;align-items:center;gap:10px;padding:9px 13px;background:var(--surface);border-radius:var(--radius-sm);margin-bottom:5px;box-shadow:var(--shadow-sm);font-size:13px}
.alert-card{background:var(--surface);border-radius:var(--radius-md);padding:14px;margin-bottom:9px;border-right:4px solid;box-shadow:var(--shadow-sm);display:flex;align-items:center;gap:12px}
.alert-card.warn{border-color:var(--amber)}
.alert-card.danger{border-color:var(--red)}
.empty-state{text-align:center;padding:46px 20px;color:var(--ink3)}
.empty-state .e-icon{font-size:48px;margin-bottom:10px;opacity:0.5}
.report-card{background:var(--surface);border-radius:var(--radius-lg);padding:16px;margin-bottom:14px;box-shadow:var(--shadow-sm)}
.report-stat{text-align:center;background:var(--purple-ll);border-radius:var(--radius-md);padding:12px}
.report-stat .num{font-size:24px;font-weight:900;color:var(--purple)}
.report-stat .lbl{font-size:11px;color:var(--ink3);margin-top:2px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
.date-picker-modal{display:none;position:fixed;inset:0;background:rgba(18,17,26,0.5);z-index:300;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.date-picker-modal.open{display:flex}
.date-picker-inner{background:var(--surface);border-radius:var(--radius-lg);padding:22px;width:290px;box-shadow:var(--shadow)}
.date-picker-inner h3{font-size:15px;font-weight:700;margin-bottom:14px}
.date-picker-inner input[type=date]{width:100%;padding:11px 13px;border-radius:var(--radius-sm);border:2px solid var(--purple-l);font-family:'Heebo',sans-serif;font-size:14px;outline:none;margin-bottom:12px}
.dp-btns{display:flex;gap:8px}
.dp-btns button{flex:1;padding:11px;border-radius:var(--radius-sm);border:none;font-family:'Heebo',sans-serif;font-size:13px;font-weight:600;cursor:pointer}
.dp-cancel{background:var(--bg);color:var(--ink2)}
.dp-confirm{background:var(--purple);color:#fff}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--purple-l);border-radius:2px}
</style>
</head>
<body>

<header class="header">
  <div class="header-brand">
    <div class="header-logo">💪</div>
    <div>
      <h1>IA TrainLog</h1>
      <p id="syncStatus">מתחבר...</p>
    </div>
  </div>
  <div class="header-actions">
    <button class="header-btn" onclick="openDatePicker()" id="headerDate">היום</button>
    <button class="header-btn" onclick="exportBackup()">💾</button>
  </div>
</header>

<div class="tabs-bar">
  <button class="tab-btn active" onclick="switchTab('log',this)">📋 רישום</button>
  <button class="tab-btn" onclick="switchTab('history',this)">📅 היסטוריה</button>
  <button class="tab-btn" onclick="switchTab('alerts',this)">⚠️ התראות</button>
  <button class="tab-btn" onclick="switchTab('leads',this)">📥 פניות</button>
  <button class="tab-btn" onclick="switchTab('report',this)">📊 דוח</button>
</div>

<div class="main">
  <div id="tab-log">
    <div class="today-banner">
      <div class="left">
        <h2>אימונים שנרשמו</h2>
        <div class="date-big" id="bannerDate"></div>
      </div>
      <div class="right">
        <div class="count-big" id="todayCount">0</div>
        <div class="count-lbl">היום</div>
      </div>
    </div>
    <div class="section-title">
      מתאמנות פעילות
      <button class="btn-add-client" id="addClientBtn">+ מתאמן/ת חדש/ה</button>
    </div>
    <div id="clientCards"></div>
  </div>

  <div id="tab-history" style="display:none">
    <div class="section-title">כל האימונים</div>
    <div id="historyList"></div>
  </div>

  <div id="tab-alerts" style="display:none">
    <div class="section-title">התראות</div>
    <div id="alertsList"></div>
  </div>

  <div id="tab-leads" style="display:none">
    <div class="section-title">פניות</div>
    <button id="addLeadBtn" class="btn-primary" style="margin-bottom:14px;">+ פנייה חדשה</button>
    <div id="leadsList"></div>
  </div>

  <div id="tab-report" style="display:none">
    <div class="section-title">דוח חודשי</div>
    <div id="reportContent"></div>
    <button onclick="exportMonthlyReport()" class="btn-primary">📥 ייצוא Excel</button>
    <button onclick="sendMonthlyEmail()" class="btn-success">📧 שלח למייל</button>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<!-- SESSIONS MODAL -->
<div class="modal-overlay" id="sessionsModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="modalTitle"></h2>
    <div class="modal-subtitle" id="modalSubtitle"></div>
    <div id="modalPayment" style="margin:8px 0;padding:9px 13px;background:var(--purple-ll);border-radius:var(--radius-sm);font-size:13px;"></div>
    <div id="modalEstimate" style="margin:6px 0;padding:7px 13px;background:var(--green-l);border-radius:var(--radius-sm);font-size:12px;color:#1A9B6C;"></div>
    <div id="modalNote" style="margin:6px 0;padding:7px 13px;background:var(--amber-l);border-radius:var(--radius-sm);font-size:12px;color:#C07D00;display:none;"></div>
    <div class="action-row">
      <button class="action-btn" id="editClientBtn" style="background:var(--purple-l);color:var(--purple-d);">✏️ עריכה</button>
      <button class="action-btn" id="newPkgBtn" style="background:var(--green-l);color:#1A9B6C;">📦 חבילה חדשה</button>
      <button class="action-btn" id="paymentBtn" style="background:var(--amber-l);color:#C07D00;">💳 תשלום</button>
    </div>
    <button class="action-btn" id="exportClientBtn" style="width:100%;background:var(--purple-ll);color:var(--purple-d);padding:9px;margin-bottom:10px;">📊 ייצוא Excel אישי</button>
    <div class="modal-sessions" id="modalSessions"></div>
    <button class="btn-modal-close" id="closeSessionsBtn">סגירה</button>
  </div>
</div>

<!-- ADD/EDIT CLIENT MODAL -->
<div class="modal-overlay" id="clientModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="clientModalTitle">מתאמן/ת חדש/ה</h2>
    <div class="field-group">
      <input id="cf_name" placeholder="שם מלא" />
      <div class="field-row">
        <select id="cf_pkg">
          <option value="8">8 אימונים – ₪1,600</option>
          <option value="24" selected>24 אימונים – ₪4,440</option>
          <option value="0">ליווי מרחוק – ₪450/חודש</option>
          <option value="custom">מותאם אישית</option>
        </select>
        <select id="cf_freq">
          <option value="1×/שבוע">1× בשבוע</option>
          <option value="2×/שבוע" selected>2× בשבוע</option>
          <option value="3×/שבוע">3× בשבוע</option>
          <option value="4×/שבוע">4× בשבוע</option>
          <option value="5×/שבוע">5× בשבוע</option>
          <option value="אונליין">אונליין</option>
        </select>
      </div>
      <input id="cf_customPkg" placeholder="מספר אימונים" type="number" style="display:none" />
      <div class="field-row">
        <input id="cf_totalPrice" placeholder="מחיר כולל ₪" type="number" />
        <input id="cf_paid" placeholder="שולם עד כה ₪" type="number" />
      </div>
      <input id="cf_payNote" placeholder="הערת תשלום (למשל: 1,480₪/חודש · תשלום 1/3 · חיוב אחרון אוגוסט)" />
      <input id="cf_note" placeholder="הערה כללית" />
      <select id="cf_color">
        <option value="#7B5EA7">סגול</option>
        <option value="#E8445A">אדום</option>
        <option value="#3498DB">כחול</option>
        <option value="#2ECC8F">ירוק</option>
        <option value="#F5A623">כתום</option>
        <option value="#9B59B6">סגול כהה</option>
        <option value="#1ABC9C">טורקיז</option>
        <option value="#E67E22">כתום כהה</option>
      </select>
    </div>
    <button class="btn-primary" id="clientSaveBtn">שמירה</button>
    <button class="btn-danger" id="clientDeleteBtn" style="display:none">🗑️ מחיקת מתאמן/ת</button>
    <button class="btn-modal-close" id="closeClientBtn">ביטול</button>
  </div>
</div>

<!-- NEW PACKAGE MODAL -->
<div class="modal-overlay" id="newPkgModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>📦 חבילה חדשה</h2>
    <div class="modal-subtitle" id="newPkgSubtitle"></div>
    <div class="field-group">
      <select id="np_pkg">
        <option value="8">8 אימונים – ₪1,600</option>
        <option value="24" selected>24 אימונים – ₪4,440</option>
        <option value="custom">מותאם אישית</option>
      </select>
      <input id="np_customPkg" placeholder="מספר אימונים" type="number" style="display:none" />
      <div class="field-row">
        <input id="np_totalPrice" placeholder="מחיר כולל ₪" type="number" />
        <input id="np_paid" placeholder="שולם עד כה ₪" type="number" />
      </div>
      <input id="np_payNote" placeholder="הערת תשלום" />
    </div>
    <button class="btn-primary" id="saveNewPkgBtn">פתיחת חבילה חדשה</button>
    <button class="btn-modal-close" id="closeNewPkgBtn">ביטול</button>
  </div>
</div>

<!-- PAYMENT MODAL -->
<div class="modal-overlay" id="paymentModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>💳 עדכון תשלום</h2>
    <div class="modal-subtitle" id="paymentSubtitle"></div>
    <div class="field-group">
      <input id="pm_amount" placeholder="סכום שנוסף ₪" type="number" />
      <input id="pm_note" placeholder="הערת תשלום מעודכנת (אופציונלי)" />
    </div>
    <button class="btn-primary" id="savePaymentBtn">עדכון</button>
    <button class="btn-modal-close" id="closePaymentBtn">ביטול</button>
  </div>
</div>

<!-- LEAD MODAL -->
<div class="modal-overlay" id="addLeadModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>📥 פנייה חדשה</h2>
    <div class="field-group">
      <input id="leadName" placeholder="שם מלא" />
      <input id="leadPhone" placeholder="טלפון" type="tel" />
      <select id="leadSource">
        <option value="">מאיפה הגיע/ה?</option>
        <option>פייסבוק</option><option>אינסטגרם</option><option>המלצה</option>
        <option>אנטון</option><option>אורית</option><option>רשף</option><option>אחר</option>
      </select>
      <select id="leadStatus">
        <option value="ליד חדש">ליד חדש</option>
        <option value="נקבע היכרות">נקבע היכרות</option>
        <option value="שילם היכרות">שילם היכרות 200₪</option>
        <option value="סגר חבילה">סגר חבילה</option>
        <option value="לא ממשיך">לא ממשיך</option>
      </select>
      <textarea id="leadNote" placeholder="הערות" rows="2" style="resize:none"></textarea>
    </div>
    <button class="btn-primary" id="saveLeadBtn">שמירה</button>
    <button class="btn-modal-close" id="closeLeadBtn">ביטול</button>
  </div>
</div>

<!-- RESTORE MODAL -->
<div class="modal-overlay" id="restoreModal">
  <div class="modal">
    <div class="modal-handle"></div>

// ── HELPERS ───────────────────────────────────────────────────────────────────
const DAYS = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
const MONTHS = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
function fmtDate(d){return `${DAYS[d.getDay()]} ${d.getDate()} ב${MONTHS[d.getMonth()]}`}
function fmtShort(iso){const d=new Date(iso+'T12:00:00');return `${d.getDate()}.${d.getMonth()+1}.${String(d.getFullYear()).slice(2)}`}
function toISO(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function todayISO(){return toISO(selectedDate)}
function getInitials(n){return n.split(' ').map(w=>w[0]).join('').slice(0,2)}
function sessionsOnDate(c,iso){return c.sessions.filter(s=>s.date===iso).length}
function totalDone(c){return (c.done||0)+c.sessions.length}

function estimatedFinish(c) {
  const rem = c.pkg - totalDone(c);
  if (rem<=0||!c.freq) return null;
  const pw = parseInt(c.freq)||2;
  const weeks = Math.ceil(rem/pw);
  const d = new Date();
  d.setDate(d.getDate()+weeks*7);
  return `${d.getDate()} ${MONTHS[d.getMonth()]}`;
}

function saveData() {

  }
}

// ── RENDER CARDS ──────────────────────────────────────────────────────────────
window.renderCards = function() {
  const container = document.getElementById('clientCards');
  if (!container) return;
  const isoToday = todayISO();
  let todayTotal = 0;

  container.innerHTML = DB.clients.map((c,idx) => {
    const done = totalDone(c);
    const rem = c.pkg>0 ? c.pkg-done : null;
    const pct = c.pkg>0 ? Math.min(100,done/c.pkg*100) : 0;
    const alreadyToday = sessionsOnDate(c,isoToday);
    if (alreadyToday>0) todayTotal++;
    const owed = (c.totalPrice||0)-(c.paid||0);
    const showDebt = owed>0 && !c.payNote; // רק אם אין הערת תשלום

    let badge='', btnClass='';
    if (c.pkg===0) badge=`<span class="badge badge-online">אונליין</span>`;
    else if (rem<=0) {badge=`<span class="badge badge-danger">🚨 נגמרה</span>`;btnClass='danger-state';}
    else if (rem<=3) {badge=`<span class="badge badge-danger">⚠️ נשארו ${rem}</span>`;btnClass='danger-state';}
    else if (rem<=6) {badge=`<span class="badge badge-warn">נשארו ${rem}</span>`;btnClass='warn-state';}
    else badge=`<span class="badge badge-ok">נשארו ${rem}</span>`;

    const last = c.sessions.length>0 ? fmtShort(c.sessions[c.sessions.length-1].date) : 'טרם';
    const todayMark = alreadyToday>0 ? `<span class="sep"></span><span style="color:var(--green);font-weight:600;font-size:11px">✓ היום</span>` : '';

    return `<div class="client-card">
      <div class="card-main" data-action="open" data-idx="${idx}">
        <div class="client-avatar" style="background:${c.color}">${getInitials(c.name)}</div>
        <div class="client-info">
          <div class="client-name">${c.name}</div>
          <div class="client-meta">
            <span>${c.freq}</span>
            ${c.pkg>0?`<span class="sep"></span><span>${done}/${c.pkg}</span>`:''}
            <span class="sep"></span>${badge}
            ${showDebt?`<span class="sep"></span><span style="color:var(--red);font-size:10px;font-weight:600">חוב ₪${owed.toLocaleString()}</span>`:''}
          </div>
          ${c.payNote?`<div style="font-size:10px;color:var(--purple);margin-top:2px;font-weight:600">💳 ${c.payNote}</div>`:''}
          <div class="client-meta" style="margin-top:2px">
            <span>אחרון: ${last}</span>${todayMark}
          </div>
          ${c.note?`<div class="client-note">${c.note}</div>`:''}
        </div>
        <div class="btn-log ${btnClass}" data-action="log" data-idx="${idx}">+</div>
      </div>
      ${c.pkg>0?`<div class="progress-wrap" data-action="open" data-idx="${idx}"><div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${pct>=90?'var(--red)':pct>=75?'var(--amber)':c.color}"></div></div></div>`:''}
    </div>`;
  }).join('');

  document.getElementById('todayCount').textContent = todayTotal;
  document.getElementById('bannerDate').textContent = fmtDate(selectedDate);
  document.getElementById('headerDate').textContent = fmtDate(selectedDate);
};

function doLog(idx) {

  const num = totalDone(c)+1;
  c.sessions.push({date:iso,num});
  saveData();
  renderCards();
  renderAlerts();
  renderHistory();
  const rem = c.pkg>0 ? c.pkg-totalDone(c) : null;
  showToast(`✅ ${c.name} — אימון ${num}${c.pkg>0?' מתוך '+c.pkg:''}`,c.color);
  if (rem!==null&&rem<=3&&rem>0) setTimeout(()=>showToast(`⚠️ נשארו ${rem} אימונים!`,'var(--amber)'),700);
  if (rem===0) setTimeout(()=>showToast('🚨 החבילה נגמרה! זמן לחידוש.','var(--red)'),700);
}

function openSessions(idx) {

  const rem = c.pkg>0 ? c.pkg-done : null;

  document.getElementById('modalTitle').textContent = c.name;

    ? `${done} בוצעו · ${rem} נשארו מתוך ${c.pkg}`
    : 'ליווי חודשי';

  const payDiv = document.getElementById('modalPayment');
  if (c.totalPrice) {
    const owed = c.totalPrice-(c.paid||0);
    payDiv.innerHTML = `💳 שולם: <strong>₪${(c.paid||0).toLocaleString()}</strong> מתוך ₪${c.totalPrice.toLocaleString()} ${owed>0?`· <span style="color:var(--red)">נשאר: ₪${owed.toLocaleString()}</span>`:'· <span style="color:var(--green)">✓ שולם</span>'}`;
    if (c.payNote) payDiv.innerHTML += `<br><span style="color:var(--ink3);font-size:11px">${c.payNote}</span>`;
    payDiv.style.display='block';
  } else payDiv.style.display='none';

  const estDiv = document.getElementById('modalEstimate');
  if (c.pkg>0&&rem>0) {
    const est = estimatedFinish(c);
    if (est) {estDiv.textContent=`📅 צפי סיום: ${est}`;estDiv.style.display='block';}
    else estDiv.style.display='none';
  } else estDiv.style.display='none';

  const noteDiv = document.getElementById('modalNote');
  if (c.note) {noteDiv.textContent=c.note;noteDiv.style.display='block';}
  else noteDiv.style.display='none';

  const container = document.getElementById('modalSessions');
  if (c.sessions.length===0) {
    container.innerHTML='<div style="text-align:center;padding:20px;color:var(--ink3);font-size:13px">אין אימונים רשומים עדיין</div>';
  } else {
    container.innerHTML=[...c.sessions].reverse().map((s,ri)=>{
      const realIdx=c.sessions.length-1-ri;
      const d=new Date(s.date+'T12:00:00');

        <span class="snum">#${s.num}</span>

        <span style="font-size:11px;color:var(--ink3)">${DAYS[d.getDay()]}</span>
        <button class="sdel" data-cidx="${idx}" data-sidx="${realIdx}">✕</button>
      </div>`;
    }).join('');
  }
  openModal('sessionsModal');
}

function exportClientExcel(idx) {
  const c = DB.clients[idx];
  const data = [['שם לקוח','תאריך','יום','מספר אימון','בחבילה']];
  [...c.sessions].sort((a,b)=>a.date.localeCompare(b.date)).forEach(s=>{
    const d=new Date(s.date+'T12:00:00');
    data.push([c.name,fmtShort(s.date),DAYS[d.getDay()],s.num,c.pkg||'אונליין']);
  });
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet(data);
  ws['!cols']=[{wch:20},{wch:12},{wch:10},{wch:12},{wch:10}];
  XLSX.utils.book_append_sheet(wb,ws,c.name.slice(0,30));
  XLSX.writeFile(wb,`${c.name}_אימונים.xlsx`);
  showToast(`📊 ייצוא ${c.name}`,'var(--green)');
  closeModal('sessionsModal');
}

// ── HISTORY ───────────────────────────────────────────────────────────────────
function renderHistory() {
  const container = document.getElementById('historyList');
  if (!container) return;
  const all=[];
  DB.clients.forEach(c=>c.sessions.forEach(s=>all.push({date:s.date,num:s.num,client:c})));
  if (!all.length){container.innerHTML='<div class="empty-state"><div class="e-icon">📋</div><p>אין אימונים עדיין</p></div>';return;}
  all.sort((a,b)=>b.date.localeCompare(a.date));
  const groups={};
  all.forEach(s=>{if(!groups[s.date])groups[s.date]=[];groups[s.date].push(s);});
  container.innerHTML=Object.entries(groups).map(([date,sessions])=>{
    const d=new Date(date+'T12:00:00');
    return `<div class="history-day">
      <div class="history-day-header">${DAYS[d.getDay()]} · ${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}</div>
      ${sessions.map(s=>`<div class="history-entry">
        <div style="width:9px;height:9px;border-radius:50%;background:${s.client.color};flex-shrink:0"></div>
        <div style="flex:1;font-weight:600">${s.client.name}</div>
        <div style="font-size:11px;color:var(--ink3)">אימון ${s.num}${s.client.pkg>0?' / '+s.client.pkg:''}</div>
      </div>`).join('')}
    </div>`;
  }).join('');
}

  const container = document.getElementById('alertsList');
  if (!container) return;
  const alerts = DB.clients
    .filter(c=>c.pkg>0)
    .map(c=>({...c,td:totalDone(c),rem:c.pkg-totalDone(c)}))
    .filter(c=>c.rem<=6)
    .sort((a,b)=>a.rem-b.rem);
  if (!alerts.length){container.innerHTML='<div class="empty-state"><div class="e-icon">🎉</div><p>הכל בסדר!</p></div>';return;}
  container.innerHTML=alerts.map(c=>{
    const isDanger=c.rem<=3;
    const est=c.rem>0?estimatedFinish(c):null;
    return `<div class="alert-card ${isDanger?'danger':'warn'}">
      <div style="font-size:22px">${isDanger?'🚨':'⚠️'}</div>
      <div>
        <div style="font-size:14px;font-weight:700">${c.name}</div>
        <div style="font-size:12px;color:var(--ink3)">${c.freq} · ${c.td}/${c.pkg} בוצעו${est?' · צפי: '+est:''}</div>
      </div>
      <div style="margin-right:auto;text-align:center">
        <div style="font-size:26px;font-weight:900;color:${isDanger?'var(--red)':'var(--amber)'}">${c.rem}</div>
        <div style="font-size:10px;color:var(--ink3)">נשאר</div>
      </div>
    </div>`;
  }).join('');
};

// ── LEADS ─────────────────────────────────────────────────────────────────────
function saveLead() {
  const name=document.getElementById('leadName').value.trim();
  if (!name){showToast('חסר שם!','var(--red)');return;}
  if (!DB.leads) DB.leads=[];
  DB.leads.push({id:Date.now(),name,phone:document.getElementById('leadPhone').value.trim(),
    source:document.getElementById('leadSource').value,status:document.getElementById('leadStatus').value,
    note:document.getElementById('leadNote').value.trim(),date:todayISO()});
  saveData();closeModal('addLeadModal');renderLeads();
  showToast(`✅ ${name} נוספ/ה`,'var(--purple)');
}

function updateLeadStatus(id,s){const l=DB.leads.find(x=>x.id===id);if(l){l.status=s;saveData();renderLeads();}}
function deleteLead(id){DB.leads=DB.leads.filter(l=>l.id!==id);saveData();renderLeads();showToast('🗑️ נמחק','#888');}

function renderLeads() {
  const c=document.getElementById('leadsList');
  if (!c) return;
  if (!DB.leads||!DB.leads.length){c.innerHTML='<div class="empty-state"><div class="e-icon">📥</div><p>אין פניות</p></div>';return;}
  const sc={'ליד חדש':'var(--purple)','נקבע היכרות':'var(--amber)','שילם היכרות':'var(--amber)','סגר חבילה':'var(--green)','לא ממשיך':'#aaa'};
  c.innerHTML=[...DB.leads].sort((a,b)=>b.id-a.id).map(l=>`
    <div style="background:#fff;border-radius:var(--radius-md);padding:13px 15px;margin-bottom:9px;box-shadow:var(--shadow-sm)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px">
        <div style="font-weight:700;font-size:14px">${l.name}</div>
        <button onclick="deleteLead(${l.id})" style="background:none;border:none;cursor:pointer;color:#ccc;font-size:15px">✕</button>
      </div>
      ${l.phone?`<div style="font-size:12px;color:var(--ink3);margin-bottom:3px">📞 ${l.phone}</div>`:''}
      ${l.source?`<div style="font-size:12px;color:var(--ink3);margin-bottom:3px">📣 ${l.source}</div>`:''}
      ${l.note?`<div style="font-size:12px;color:var(--ink2);margin-bottom:6px;font-style:italic">${l.note}</div>`:''}
      <div style="display:flex;align-items:center;gap:7px;margin-top:7px">
        <span style="font-size:11px;font-weight:600;color:${sc[l.status]||'var(--purple)'};background:${sc[l.status]||'var(--purple)'}22;padding:3px 9px;border-radius:20px">${l.status}</span>
        <select onchange="updateLeadStatus(${l.id},this.value)" style="flex:1;padding:4px 7px;border-radius:20px;border:1.5px solid #e0daea;font-family:'Heebo',sans-serif;font-size:11px;background:#fff;direction:rtl">
          ${['ליד חדש','נקבע היכרות','שילם היכרות','סגר חבילה','לא ממשיך'].map(s=>`<option ${l.status===s?'selected':''}>${s}</option>`).join('')}
        </select>
      </div>
      <div style="font-size:10px;color:var(--ink3);margin-top:5px">${fmtShort(l.date)}</div>
    </div>`).join('');
}

// ── REPORT ────────────────────────────────────────────────────────────────────
function renderReport() {
  const now = new Date();
  const isoMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const monthStr = `${MONTHS[now.getMonth()]} ${now.getFullYear()}`;

  let totalSessions=0,totalRevenue=0,totalOwed=0;
  const rows = DB.clients.map(c=>{
    const done = totalDone(c);
    const thisMonth = c.sessions.filter(s=>s.date.startsWith(isoMonth)).length;
    const rem = c.pkg>0 ? c.pkg-done : null;
    const owed = (c.totalPrice||0)-(c.paid||0);
    totalSessions+=thisMonth;
    totalOwed+=owed;

    // Only count payments received this month
    const monthPayments = (DB.payments||[]).filter(p=>p.clientName===c.name&&p.date.startsWith(isoMonth));
    const monthRevenue = monthPayments.reduce((s,p)=>s+p.amount,0);
    totalRevenue+=monthRevenue;

    const status = rem!==null&&rem<=3?'🔴 מסיים בקרוב':rem===0?'🚨 נגמר':c.note?`⚠️ ${c.note}`:'🟢 פעיל';
    return {c,done,thisMonth,rem,owed,monthRevenue,status};
  });

  // Alerts
  const finishing = rows.filter(r=>r.rem!==null&&r.rem<=6);

  document.getElementById('reportContent').innerHTML=`
    <div class="report-card">
      <div style="font-size:15px;font-weight:800;margin-bottom:14px">📊 ${monthStr}</div>
      <div class="stats-grid">
        <div class="report-stat"><div class="num">${totalSessions}</div><div class="lbl">אימונים</div></div>
        <div class="report-stat" style="background:var(--green-l)"><div class="num" style="color:var(--green)">₪${totalRevenue.toLocaleString()}</div><div class="lbl">נכנס החודש</div></div>
        <div class="report-stat" style="background:var(--red-l)"><div class="num" style="color:var(--red)">₪${totalOwed.toLocaleString()}</div><div class="lbl">חובות פתוחים</div></div>
      </div>
      ${finishing.length?`<div style="background:var(--amber-l);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:12px">
        <div style="font-size:12px;font-weight:700;color:#C07D00;margin-bottom:6px">⚠️ שים לב – מסיימים בקרוב</div>
        ${finishing.map(r=>`<div style="font-size:12px;color:var(--ink2);margin-bottom:3px">• ${r.c.name} – נשארו ${r.rem} אימונים</div>`).join('')}
      </div>`:''}
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:12px;direction:rtl">
          <thead><tr style="background:var(--purple);color:#fff">
            <th style="padding:8px 10px;text-align:right">שם</th>
            <th style="padding:8px 6px;text-align:center">החודש</th>
            <th style="padding:8px 6px;text-align:center">נכנס</th>
            <th style="padding:8px 6px;text-align:center">חוב</th>
            <th style="padding:8px 6px;text-align:center">סטטוס</th>
          </tr></thead>
          <tbody>${rows.map((r,i)=>`<tr style="background:${i%2===0?'#fff':'var(--bg)'}">
            <td style="padding:8px 10px;font-weight:600">${r.c.name}</td>
            <td style="padding:8px 6px;text-align:center">${r.thisMonth}</td>
            <td style="padding:8px 6px;text-align:center;color:var(--green)">${r.monthRevenue?'₪'+r.monthRevenue.toLocaleString():'—'}</td>
            <td style="padding:8px 6px;text-align:center;color:${r.owed>0?'var(--red)':'var(--green)'}">${r.owed>0?'₪'+r.owed.toLocaleString():'✓'}</td>
            <td style="padding:8px 6px;text-align:center;font-size:11px">${r.status}</td>
          </tr>`).join('')}</tbody>
        </table>
      </div>
    </div>`;
}

function exportMonthlyReport() {
  const now = new Date();
  const isoMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const monthStr = `${MONTHS[now.getMonth()]} ${now.getFullYear()}`;

  const summary=[['דוח חודשי IA TrainLog','','','',''],['חודש:',monthStr,'','',''],['','','','',''],
    ['שם','אימונים החודש','נכנס החודש','חוב פתוח','סטטוס']];
  let totSes=0,totRev=0;
  DB.clients.forEach(c=>{
    const done=totalDone(c);
    const thisMonth=c.sessions.filter(s=>s.date.startsWith(isoMonth)).length;
    const rem=c.pkg>0?c.pkg-done:null;
    const owed=(c.totalPrice||0)-(c.paid||0);
    const monthRev=(DB.payments||[]).filter(p=>p.clientName===c.name&&p.date.startsWith(isoMonth)).reduce((s,p)=>s+p.amount,0);
    totSes+=thisMonth;totRev+=monthRev;
    const status=rem!==null&&rem<=3?'מסיים בקרוב':rem===0?'נגמר':'פעיל';
    summary.push([c.name,thisMonth,monthRev||0,owed,status]);
  });
  summary.push(['','','','','']);
  summary.push(['סה"כ',totSes,totRev,'','']);

  const allSessions=[['שם','תאריך','יום','מספר אימון']];
  DB.clients.forEach(c=>c.sessions.forEach(s=>{
    const d=new Date(s.date+'T12:00:00');
    allSessions.push([c.name,fmtShort(s.date),DAYS[d.getDay()],s.num]);
  }));

  const wb=XLSX.utils.book_new();
  const ws1=XLSX.utils.aoa_to_sheet(summary);
  const ws2=XLSX.utils.aoa_to_sheet(allSessions);
  ws1['!cols']=[{wch:22},{wch:12},{wch:14},{wch:12},{wch:14}];
  ws2['!cols']=[{wch:22},{wch:12},{wch:10},{wch:12}];
  XLSX.utils.book_append_sheet(wb,ws1,'סיכום חודשי');
  XLSX.utils.book_append_sheet(wb,ws2,'כל האימונים');
  XLSX.writeFile(wb,`IA_TrainLog_${monthStr}.xlsx`);
  showToast('📥 הדוח יורד...','var(--green)');
}

function sendMonthlyEmail() {
  const now = new Date();
  const isoMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const monthStr = `${MONTHS[now.getMonth()]} ${now.getFullYear()}`;
  let msg = `📊 דוח חודשי | ${monthStr}\n\n`;
  let totSes=0,totRev=0,totOwed=0;
  DB.clients.forEach(c=>{
    const done=totalDone(c);
    const thisMonth=c.sessions.filter(s=>s.date.startsWith(isoMonth)).length;
    const rem=c.pkg>0?c.pkg-done:null;
    const owed=(c.totalPrice||0)-(c.paid||0);
    const monthRev=(DB.payments||[]).filter(p=>p.clientName===c.name&&p.date.startsWith(isoMonth)).reduce((s,p)=>s+p.amount,0);
    totSes+=thisMonth;totRev+=monthRev;totOwed+=owed;
    msg+=`• ${c.name}: ${thisMonth} אימונים${rem!==null?' | נשאר '+rem:''}${owed>0?' | חוב ₪'+owed:''}\n`;
  });
  msg+=`\n✅ סה"כ אימונים: ${totSes}\n💰 נכנס החודש: ₪${totRev.toLocaleString()}\n⚠️ חובות פתוחים: ₪${totOwed.toLocaleString()}`;

  showToast('📧 שולח...','var(--amber)');
  sendEmail('דוח חודשי',msg)
    .then(()=>showToast('✅ הדוח נשלח למייל!','var(--green)'))
    .catch(()=>showToast('❌ שגיאה בשליחה','var(--red)'));
}

// ── BACKUP ────────────────────────────────────────────────────────────────────
function exportBackup() {
  const blob = new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `ia_backup_${todayISO()}.json`;
  a.click();
  showToast('💾 גיבוי יורד...','var(--purple)');
}

function restoreBackup() {
  const file = document.getElementById('restoreFile').files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.clients) throw new Error('קובץ לא תקין');
      window.DB = data;
      saveData();renderCards();renderAlerts();closeModal('restoreModal');
      showToast('✅ נתונים שוחזרו!','var(--green)');
    } catch {showToast('❌ קובץ שגוי','var(--red)');}
  };
  reader.readAsText(file);
}

// ── AUTO WEEKLY BACKUP ────────────────────────────────────────────────────────
function checkWeeklyBackup() {
  const lastBackup = localStorage.getItem('lastWeeklyBackup');
  const now = Date.now();
  if (!lastBackup || now-parseInt(lastBackup) > 7*24*60*60*1000) {
    const msg = `📦 גיבוי שבועי אוטומטי\n\n${JSON.stringify(DB,null,2)}`;
    sendEmail('גיבוי שבועי',msg)
      .then(()=>{localStorage.setItem('lastWeeklyBackup',now.toString());})
      .catch(()=>{});
  }
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function switchTab(tab,btn) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ['log','history','alerts','leads','report'].forEach(t=>{
    document.getElementById('tab-'+t).style.display=t===tab?'block':'none';
  });
  if(tab==='history')renderHistory();
  if(tab==='alerts')renderAlerts();
  if(tab==='leads')renderLeads();
  if(tab==='report')renderReport();
}

// ── MODALS ────────────────────────────────────────────────────────────────────
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}

// ── DATE PICKER ───────────────────────────────────────────────────────────────
function openDatePicker(){
  document.getElementById('datePickerInput').value=toISO(selectedDate);
  document.getElementById('datePickerModal').classList.add('open');
}
function closeDatePicker(){document.getElementById('datePickerModal').classList.remove('open');}
function confirmDate(){
  const val=document.getElementById('datePickerInput').value;
  if(!val)return;
  selectedDate=new Date(val+'T12:00:00');
  closeDatePicker();renderCards();
  showToast(`📅 ${fmtDate(selectedDate)}`,'var(--purple)');
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function showToast(msg,color) {
  const c=document.getElementById('toastContainer');
  const t=document.createElement('div');
  t.className='toast';
  if(color)t.style.borderRight=`4px solid ${color}`;
  t.textContent=msg;
  c.appendChild(t);
  setTimeout(()=>{t.classList.add('removing');setTimeout(()=>t.remove(),250);},2600);
}

// ── EVENT DELEGATION ──────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded',function(){
  // Cards - fix scroll vs tap
  const cards = document.getElementById('clientCards');
  let touchStartY = 0;
  let touchStartX = 0;

  cards.addEventListener('touchstart', e => {
    touchStartY = e.touches[0].clientY;
    touchStartX = e.touches[0].clientX;
  }, {passive: true});

  cards.addEventListener('touchend', e => {
    const dy = Math.abs(e.changedTouches[0].clientY - touchStartY);
    const dx = Math.abs(e.changedTouches[0].clientX - touchStartX);
    if (dy > 10 || dx > 10) return; // גלילה – לא לחיצה

    const logBtn = e.target.closest('[data-action="log"]');
    if (logBtn) {
      e.preventDefault();
      e.stopPropagation();
      doLog(parseInt(logBtn.dataset.idx));
      return;
    }
    const openEl = e.target.closest('[data-action="open"]');
    if (openEl) openSessions(parseInt(openEl.dataset.idx));
  }, {passive: false});

  cards.addEventListener('click', e => {
    const logBtn = e.target.closest('[data-action="log"]');
    if (logBtn) { e.stopPropagation(); doLog(parseInt(logBtn.dataset.idx)); return; }
    const openEl = e.target.closest('[data-action="open"]');
    if (openEl) openSessions(parseInt(openEl.dataset.idx));
  });

  // Sessions modal buttons
  document.getElementById('editClientBtn').addEventListener('click',()=>openEditClient(currentClientIdx));
  document.getElementById('newPkgBtn').addEventListener('click',()=>openNewPackage(currentClientIdx));
  document.getElementById('paymentBtn').addEventListener('click',()=>openPayment(currentClientIdx));
  document.getElementById('exportClientBtn').addEventListener('click',()=>exportClientExcel(currentClientIdx));
  document.getElementById('closeSessionsBtn').addEventListener('click',()=>closeModal('sessionsModal'));
  document.getElementById('sessionsModal').addEventListener('click',e=>{if(e.target===document.getElementById('sessionsModal'))closeModal('sessionsModal');});

  // Session delete
  document.getElementById('modalSessions').addEventListener('click',e=>{
    const btn=e.target.closest('.sdel');
    if(btn)deleteSession(parseInt(btn.dataset.cidx),parseInt(btn.dataset.sidx));
  });

  // Client modal
  document.getElementById('addClientBtn').addEventListener('click',openAddClient);
  document.getElementById('clientSaveBtn').addEventListener('click',saveClient);
  document.getElementById('clientDeleteBtn').addEventListener('click',deleteClient);
  document.getElementById('closeClientBtn').addEventListener('click',()=>closeModal('clientModal'));
  document.getElementById('clientModal').addEventListener('click',e=>{if(e.target===document.getElementById('clientModal'))closeModal('clientModal');});
  document.getElementById('cf_pkg').addEventListener('change',function(){
    document.getElementById('cf_customPkg').style.display=this.value==='custom'?'block':'none';
    const p={'8':1600,'24':4440,'0':450};
    if(this.value!=='custom')document.getElementById('cf_totalPrice').value=p[this.value]||'';
  });

  // New package modal
  document.getElementById('saveNewPkgBtn').addEventListener('click',saveNewPackage);
  document.getElementById('closeNewPkgBtn').addEventListener('click',()=>closeModal('newPkgModal'));
  document.getElementById('np_pkg').addEventListener('change',function(){
    document.getElementById('np_customPkg').style.display=this.value==='custom'?'block':'none';
    const p={'8':1600,'24':4440};
    if(this.value!=='custom')document.getElementById('np_totalPrice').value=p[this.value]||'';
  });

  // Payment modal
  document.getElementById('savePaymentBtn').addEventListener('click',savePayment);
  document.getElementById('closePaymentBtn').addEventListener('click',()=>closeModal('paymentModal'));

  // Lead modal
  document.getElementById('addLeadBtn').addEventListener('click',()=>openModal('addLeadModal'));
  document.getElementById('saveLeadBtn').addEventListener('click',saveLead);
  document.getElementById('closeLeadBtn').addEventListener('click',()=>closeModal('addLeadModal'));

  // Restore modal
  document.getElementById('confirmRestoreBtn').addEventListener('click',restoreBackup);
  document.getElementById('closeRestoreBtn').addEventListener('click',()=>closeModal('restoreModal'));

  // Date picker
  document.getElementById('confirmDateBtn').addEventListener('click',confirmDate);
  document.getElementById('cancelDateBtn').addEventListener('click',closeDatePicker);

  // Check weekly backup
  setTimeout(checkWeeklyBackup, 3000);
});

// ── INIT ──────────────────────────────────────────────────────────────────────
renderCards();
renderAlerts();
</script>
</body>
